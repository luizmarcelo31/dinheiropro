name: Supabase RLS Auditor

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  audit_rls:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Run Audit Script
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Aqui o robô executa a lógica que você postou no início
          # Ele vai ler o diff do PR e verificar o RLS
          supabase login --token ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          echo "Iniciando Auditoria de RLS conforme as regras do Supadata..."
          # O robô agora analisa seus arquivos .sql ou modelos